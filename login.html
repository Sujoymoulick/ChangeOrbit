<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connect ChangeOrbit to GitHub</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <!-- Stylesheet -->
    <link rel="stylesheet" href="styles.css">
    
    <style>
        /* Specific Styles for Login Screen */
        .login-body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #060913 0%, #0c1224 100%);
            padding: 20px;
        }

        .login-card {
            width: 100%;
            max-width: 480px;
            padding: 40px 30px;
            text-align: center;
            position: relative;
            overflow: hidden;
            animation: scaleIn 0.4s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
        }

        .login-card::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(0, 242, 254, 0.08) 0%, transparent 60%);
            pointer-events: none;
            z-index: 0;
        }

        .login-logo {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 60px;
            height: 60px;
            border-radius: 16px;
            background: linear-gradient(135deg, var(--primary-accent), var(--secondary-accent));
            color: #FFF;
            box-shadow: 0 0 30px rgba(0, 242, 254, 0.45);
            margin-bottom: 20px;
            font-size: 1.5rem;
            z-index: 1;
            position: relative;
        }

        .login-card h2 {
            font-size: 1.8rem;
            font-weight: 800;
            margin-bottom: 8px;
            letter-spacing: -0.5px;
            z-index: 1;
            position: relative;
        }

        .login-card h2 span {
            background: linear-gradient(to right, var(--primary-accent), var(--secondary-accent));
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .login-card p.intro {
            font-size: 0.9rem;
            color: var(--text-secondary);
            margin-bottom: 30px;
            z-index: 1;
            position: relative;
            line-height: 1.5;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
            text-align: left;
            margin-bottom: 20px;
            z-index: 1;
            position: relative;
        }

        .input-group label {
            font-size: 0.8rem;
            font-weight: 600;
            color: var(--text-secondary);
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }

        .input-wrapper {
            position: relative;
            width: 100%;
        }

        .input-wrapper i {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            width: 18px;
            height: 18px;
        }

        .input-wrapper input {
            width: 100%;
            padding: 12px 16px 12px 42px;
            background: rgba(0, 0, 0, 0.25);
            border: 1px solid var(--border-color);
            border-radius: 10px;
            color: #FFF;
            font-family: inherit;
            font-size: 0.95rem;
            outline: none;
            transition: all 0.2s ease;
        }

        .input-wrapper input:focus {
            border-color: var(--primary-accent);
            box-shadow: 0 0 0 3px var(--primary-accent-glow);
        }

        .btn-auth {
            margin-top: 10px;
            height: 48px;
            z-index: 1;
            position: relative;
        }

        /* Success & Loading Visuals */
        .loading-spinner {
            display: inline-block;
            width: 24px;
            height: 24px;
            border: 3px solid rgba(255, 255, 255, 0.2);
            border-radius: 50%;
            border-top-color: #FFF;
            animation: spin 1s ease-in-out infinite;
        }

        .success-box {
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px 0;
            z-index: 1;
            position: relative;
            animation: fadeIn 0.4s ease forwards;
        }

        .success-icon {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: rgba(16, 185, 129, 0.15);
            border: 3px solid var(--color-feat);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--color-feat);
            box-shadow: 0 0 20px rgba(16, 185, 129, 0.2);
            margin-bottom: 20px;
            animation: pulse 2s infinite;
        }

        .success-box h3 {
            font-size: 1.4rem;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .success-box p {
            font-size: 0.9rem;
            color: var(--text-secondary);
            margin-bottom: 10px;
        }

        .user-preview {
            display: flex;
            align-items: center;
            gap: 12px;
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid var(--border-color);
            padding: 10px 20px;
            border-radius: 12px;
            margin-top: 15px;
        }

        .user-preview img {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            border: 2px solid var(--primary-accent);
        }

        .user-preview-details {
            text-align: left;
        }

        .user-preview-name {
            font-size: 0.85rem;
            font-weight: 700;
        }

        .user-preview-login {
            font-size: 0.75rem;
            color: var(--text-muted);
        }

        .error-message {
            color: var(--color-fix);
            font-size: 0.8rem;
            font-weight: 600;
            margin-top: 10px;
            display: none;
            text-align: left;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body class="login-body">
    <div class="glass-card login-card">
        
        <!-- Standard Login State -->
        <div id="login-state">
            <div class="login-logo">
                <i data-lucide="git-branch"></i>
            </div>
            
            <h2>Connect with <span>ChangeOrbit</span></h2>
            <p class="intro">Sync your terminal repository timeline with your GitHub developer profile avatar, stats, and repository coordinates.</p>
            
            <form id="auth-form">
                <div class="input-group">
                    <label for="github-username">GitHub Username</label>
                    <div class="input-wrapper">
                        <i data-lucide="github"></i>
                        <input type="text" id="github-username" placeholder="e.g. sujoymoulick" required>
                    </div>
                </div>
                
                <div class="input-group">
                    <label for="github-pat">Personal Access Token <span style="font-size:0.65rem; color:#EF4444; text-transform:none;">(Required)</span></label>
                    <div class="input-wrapper">
                        <i data-lucide="key-round"></i>
                        <input type="password" id="github-pat" placeholder="ghp_xxxxxxxxxxxxxxxxxxxxxx" required>
                    </div>
                </div>
                
                <div id="error-box" class="error-message"></div>
                
                <button type="submit" id="submit-btn" class="btn btn-primary btn-full btn-auth">
                    <i data-lucide="zap"></i> Sync & Log In
                </button>
            </form>
        </div>

        <!-- Success Complete State -->
        <div id="success-state" class="success-box">
            <div class="success-icon">
                <i data-lucide="check" style="width:32px; height:32px;"></i>
            </div>
            <h3>Authentication Completed!</h3>
            <p>Your session has been securely synchronized with the CLI.</p>
            <div class="user-preview" id="user-preview">
                <!-- Injected dynamically -->
            </div>
            <p style="margin-top: 20px; font-size: 0.75rem; color: var(--text-muted);" id="redirect-message">
                Closing terminal broker and launching ChangeOrbit...
            </p>
        </div>

    </div>

    <script>
        lucide.createIcons();

        const form = document.getElementById("auth-form");
        const usernameInput = document.getElementById("github-username");
        const patInput = document.getElementById("github-pat");
        const submitBtn = document.getElementById("submit-btn");
        const errorBox = document.getElementById("error-box");
        const loginState = document.getElementById("login-state");
        const successState = document.getElementById("success-state");
        const userPreview = document.getElementById("user-preview");

        form.addEventListener("submit", async (e) => {
            e.preventDefault();
            
            // Clear previous errors
            errorBox.style.display = "none";
            errorBox.textContent = "";
            
            const username = usernameInput.value.trim();
            const pat = patInput.value.trim();
            
            if (!username || !pat) {
                errorBox.textContent = "Both Username and Personal Access Token are required.";
                errorBox.style.display = "block";
                return;
            }

            // Set loading state
            const originalBtnHTML = submitBtn.innerHTML;
            submitBtn.disabled = true;
            submitBtn.innerHTML = `<span class="loading-spinner"></span> Connecting...`;

            try {
                // 1. Validate Personal Access Token against the authenticated user endpoint
                const headers = { "Authorization": `Bearer ${pat}` };
                const tokenResponse = await fetch("https://api.github.com/user", { headers });
                
                if (tokenResponse.status === 401) {
                    throw new Error("Invalid Personal Access Token. Please check your token key and permissions.");
                } else if (!tokenResponse.ok) {
                    throw new Error(`GitHub API Authorization Failed: ${tokenResponse.statusText}`);
                }
                
                const profile = await tokenResponse.json();
                
                // 2. Enforce that the provided token belongs to the typed username
                if (profile.login.toLowerCase() !== username.toLowerCase()) {
                    throw new Error(`The provided token belongs to @${profile.login}, which does not match the typed username @${username}.`);
                }
                
                // Assemble clean user session
                const user = {
                    login: profile.login,
                    name: profile.name || profile.login,
                    avatar_url: profile.avatar_url,
                    email: profile.email || "",
                    bio: profile.bio || ""
                };

                // Query private primary emails to ensure commit matching works perfectly
                try {
                    const emailRes = await fetch("https://api.github.com/user/emails", { headers });
                    if (emailRes.ok) {
                        const emails = await emailRes.json();
                        const primaryEmailObj = emails.find(e => e.primary);
                        if (primaryEmailObj) {
                            user.email = primaryEmailObj.email;
                        }
                    }
                } catch (e) {
                    console.warn("Could not fetch user emails, using profile email instead.", e);
                }

                const sessionPayload = {
                    githubToken: pat,
                    user: user
                };
                
                // Write session to local Node server
                const saveResponse = await fetch("/api/login-success", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(sessionPayload)
                });
                
                if (!saveResponse.ok) {
                    throw new Error("Could not save session. Server connection error.");
                }
                
                // Show Success Screen
                loginState.style.display = "none";
                successState.style.display = "flex";
                
                userPreview.innerHTML = `
                    <img src="${profile.avatar_url}" alt="avatar">
                    <div class="user-preview-details">
                        <div class="user-preview-name">${profile.name || profile.login}</div>
                        <div class="user-preview-login">@${profile.login}</div>
                    </div>
                `;
                
                lucide.createIcons();

                // Redirect dynamically to main page after server has compiled everything!
                setTimeout(() => {
                    window.location.href = "/changeorbit.html";
                }, 2500);

            } catch (err) {
                console.error(err);
                errorBox.textContent = err.message;
                errorBox.style.display = "block";
                
                // Reset submit button
                submitBtn.disabled = false;
                submitBtn.innerHTML = originalBtnHTML;
                lucide.createIcons();
            }
        });
    </script>
</body>
</html>
